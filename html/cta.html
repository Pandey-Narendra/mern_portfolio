<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Expertise</title>

<link rel="stylesheet" href="css/theme.css">

<style>

/* ================================
CTA SECTION
================================ */

.section-freelance {
    background: url(../images/splash.jpg);
    background-size: cover;
    background-attachment: fixed;
    background-repeat: no-repeat;
    position: relative;
    z-index: 0;
}

.section-freelance:after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    bottom: 0;
    background: #2a2d35;
    z-index: -1;
    opacity: 0.5;
}

.section-freelance h2 {
    color: #fff;
}
/* heading */

.section-freelance h2{

color:#fff;

font-size:clamp(2rem,4vw,3rem);

margin-bottom:1.5rem;

}

/* button improvement */

.section-freelance .btn-outline{

border-color:var(--accent);

color:var(--accent);

padding:14px 36px;

transition:all .3s ease;

}

.section-freelance .btn-outline:hover{

background:var(--accent);

color:#111;

box-shadow:0 0 15px rgba(247,200,115,.45);

transform:translateY(-3px);

}

/* responsive fix */

@media(max-width:768px){

.section-freelance{

background-attachment:scroll;

}

}

</style>

</head>

<body>

<!-- CTA -->

<section class="section section-freelance section-dark text-center">

<div class="container">

<div class="section-head">

<h2>Let's work together!</h2>

</div>

<div class="mt-5">

<a href="#" target="_blank" class="btn btn-outline">

Here's my CV

</a>

</div>

</div>

</section>

<!-- CTA -->

</body>
</html>
