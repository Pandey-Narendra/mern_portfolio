<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hey, It's Me</title>

<link rel="shortcut icon" href="github/GitHub-Mark-Light-64px.png">

<link rel="stylesheet" href="css/vendor.css">
<link rel="stylesheet" href="css/justin-red.css">
<link rel="stylesheet" href="css/custom.css">
<link rel="stylesheet" href="css/navbar.css">

<script src="https://kit.fontawesome.com/43e5b1ec09.js" crossorigin="anonymous"></script>

<style>

/* ============================= */
/* PROJECT SECTION */
/* ============================= */

#projects-section{
background:var(--bg-dark);
color:var(--text-color);
padding:5rem 1rem;
text-align:center;
}

.section-head span{
display:block;
font-size:1rem;
letter-spacing:2px;
text-transform:uppercase;
color:var(--accent);
}

.section-head h2{
font-size:2.5rem;
margin-top:.5rem;
color:var(--accent);
}

/* ============================= */
/* FILTER BUTTONS */
/* ============================= */

.project-filters{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin:40px 0;
}

.filter-btn{
padding:8px 18px;
border:1px solid var(--border-color);
background:var(--bg-card);
color:var(--text-color);
border-radius:6px;
cursor:pointer;
transition:.3s;
}

.filter-btn:hover{
border-color:var(--accent);
}

.filter-btn.active{
background:var(--accent);
color:#111;
}

/* ============================= */
/* GRID */
/* ============================= */

.projects-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,380px));
gap:2rem;
max-width:1200px;
margin:auto;
justify-content:center;
}

/* ============================= */
/* CARD */
/* ============================= */

.project-card{
background:var(--bg-card);
border:1px solid var(--border-color);
border-radius:1rem;
overflow:hidden;

box-shadow:0 5px 15px rgba(0,0,0,.6);

display:flex;
flex-direction:column;

width:100%;
max-width:380px;
margin:auto;

transition:
transform .45s cubic-bezier(.25,.8,.25,1),
opacity .35s ease;

opacity:1;
transform:translateY(0);
}

.project-card.hide{
opacity:0;
transform:scale(.85) translateY(40px);
pointer-events:none;
}

.project-card:hover{
transform:translateY(-8px);
box-shadow:0 0 10px #ebd4aa;
}

/* ============================= */
/* IMAGE */
/* ============================= */

.project-image{
width:100%;
height:220px;
object-fit:cover;
border-bottom:1px solid var(--border-color);
}

/* ============================= */
/* CONTENT */
/* ============================= */

.project-content{
padding:1.8rem;
display:flex;
flex-direction:column;
flex-grow:1;
text-align:left;
position:relative;
overflow:hidden;
}

.project-content::after{
content:"";
position:absolute;
top:var(--y,50%);
left:var(--x,50%);
width:0;
height:0;
background:radial-gradient(circle,rgba(247,200,115,.2),transparent 80%);
transform:translate(-50%,-50%);
transition:.4s;
pointer-events:none;
}

.project-content.hovered::after{
width:200%;
height:200%;
}

/* TEXT */

.project-title{
color:var(--accent);
margin-bottom:.6rem;
font-size:1.6rem;
}

.project-description{
margin-bottom:1rem;
line-height:1.6;
}

/* TECH TAGS */

.tech-stack{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:1rem;
}

.tech-tag{
padding:5px 10px;
border:1px solid var(--border-color);
border-radius:6px;
font-size:.85rem;
color:var(--accent);
}

/* BUTTON */

.project-link{
margin-top:auto;
display:inline-block;
padding:8px 16px;
background:var(--accent);
color:#111;
border-radius:6px;
text-decoration:none;
font-weight:600;
}

.project-link:hover{
background:#e5b45f;
}

/* ============================= */
/* MODAL */
/* ============================= */

.project-modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);

display:flex;
align-items:center;
justify-content:center;

opacity:0;
visibility:hidden;
transition:opacity .3s ease;

z-index:9999;
}

.project-modal.active{
opacity:1;
visibility:visible;
}

.modal-content{
background:var(--bg-card);
padding:30px;
border-radius:10px;
max-width:700px;
width:90%;
text-align:center;
position:relative;
}

/* gallery */

.modal-gallery{
margin-bottom:20px;
}

.modal-main-img{
width:100%;
max-height:350px;
object-fit:cover;
border-radius:8px;
margin-bottom:12px;
}

.modal-thumbnails{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

.modal-thumbnails img{
width:70px;
height:50px;
object-fit:cover;
border-radius:4px;
cursor:pointer;
opacity:.7;
border:1px solid var(--border-color);
}

.modal-thumbnails img:hover{
opacity:1;
border-color:var(--accent);
}

.modal-thumbnails img.active{
opacity:1;
border-color:var(--accent);
}

.modal-close{
position:absolute;
top:15px;
right:20px;
font-size:30px;
cursor:pointer;
color:white;
}

</style>

</head>

<body>

<section id="projects-section">

<div class="container">

<div class="section-head">
<span>Achievements</span>
<h2>My Projects</h2>
</div>

<div class="project-filters">

<button class="filter-btn active" data-filter="all">All</button>
<button class="filter-btn" data-filter="frontend">Frontend</button>
<button class="filter-btn" data-filter="backend">Backend</button>
<button class="filter-btn" data-filter="design">Design</button>

</div>

<div class="projects-grid">

<!-- PROJECT -->

<div class="project-card"
data-category="frontend"
data-images="./images/p1.jpg,./images/p2.jpg,./images/p3.jpg">

<img src="./images/p1.jpg" class="project-image">

<div class="project-content">

<h3 class="project-title">Portfolio Website</h3>

<p class="project-description">
Modern portfolio website with responsive UI.
</p>

<div class="tech-stack">
<span class="tech-tag">HTML</span>
<span class="tech-tag">CSS</span>
<span class="tech-tag">JavaScript</span>
</div>

<a href="#" class="project-link">View Live</a>

</div>
</div>

</div>

</div>

</section>

<!-- MODAL -->

<div class="project-modal" id="projectModal">

<div class="modal-content">

<span class="modal-close">&times;</span>

<div class="modal-gallery">

<img id="modalMainImage" class="modal-main-img">

<div class="modal-thumbnails" id="modalThumbs"></div>

</div>

<h3 id="modalTitle"></h3>

<p id="modalDesc"></p>

</div>

</div>

<script>

/* hover glow */

const projectSection=document.getElementById('projects-section');

projectSection.addEventListener('mousemove',e=>{

const rect=projectSection.getBoundingClientRect();

const x=((e.clientX-rect.left)/rect.width)*100;
const y=((e.clientY-rect.top)/rect.height)*100;

document.querySelectorAll('.project-content').forEach(content=>{

content.style.setProperty('--x',`${x}%`);
content.style.setProperty('--y',`${y}%`);
content.classList.add('hovered');

});

});

projectSection.addEventListener('mouseleave',()=>{

document.querySelectorAll('.project-content').forEach(content=>{
content.classList.remove('hovered');
});

});


/* FILTER */

const filterButtons=document.querySelectorAll(".filter-btn");
const projectCards=document.querySelectorAll(".project-card");

filterButtons.forEach(btn=>{

btn.addEventListener("click",()=>{

document.querySelector(".filter-btn.active").classList.remove("active");
btn.classList.add("active");

const filter=btn.dataset.filter;

projectCards.forEach(card=>{

if(filter==="all"||card.dataset.category===filter){

card.style.display="flex";
card.classList.remove("hide");

}else{

card.classList.add("hide");

setTimeout(()=>card.style.display="none",300);

}

});

});

});


/* MODAL */

const modal=document.getElementById("projectModal");
const modalContent=document.querySelector(".modal-content");

const modalMain=document.getElementById("modalMainImage");
const modalThumbs=document.getElementById("modalThumbs");

const modalTitle=document.getElementById("modalTitle");
const modalDesc=document.getElementById("modalDesc");

document.querySelectorAll(".project-card").forEach(card=>{

card.addEventListener("click",()=>{

const images=card.dataset.images.split(",");

modalThumbs.innerHTML="";

modalMain.src=images[0];

images.forEach((img,i)=>{

const thumb=document.createElement("img");
thumb.src=img;

if(i===0) thumb.classList.add("active");

thumb.onclick=()=>{

modalMain.src=img;

document.querySelectorAll(".modal-thumbnails img").forEach(t=>t.classList.remove("active"));
thumb.classList.add("active");

};

modalThumbs.appendChild(thumb);

});

modalTitle.textContent=card.querySelector(".project-title").textContent;
modalDesc.textContent=card.querySelector(".project-description").textContent;

modal.classList.add("active");

});

});

/* modal close */

document.querySelector(".modal-close").onclick=()=>{
modal.classList.remove("active");
};

modal.addEventListener("click",(e)=>{

if(!modalContent.contains(e.target)){
modal.classList.remove("active");
}

});

</script>

</body>
</html>
