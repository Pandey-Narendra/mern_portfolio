<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Blog Section</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

/* ================= THEME ================= */

:root{
--bg-dark:#0b0b0c;
--accent:#f7c873;
--text:#e2e2e2;
--border:#333;
}

/* ================= BODY ================= */

body{
margin:0;
background:var(--bg-dark);
color:var(--text);
font-family:'Inter',sans-serif;
}

/* ================= SECTION ================= */

.section-blogs{
padding:120px 0;
background:var(--bg-dark);
overflow:hidden;
}

/* ================= HEADER ================= */

.section-head{
text-align:center;
}

.section-head span{
color:var(--accent);
letter-spacing:2px;
font-size:14px;
text-transform:uppercase;
}

.section-head h2{
font-size:40px;
margin-top:10px;
}

/* ================= BLOG LIST ================= */

.nav-blog{
display:flex;
flex-direction:column;
gap:35px;
margin-top:90px;
position:relative;
}

/* ================= BLOG LINKS ================= */

.nav-blog a{

color:rgba(255,255,255,0.18);

font-size:clamp(2.5rem,6vw,6rem);

font-weight:300;

text-decoration:none;

position:relative;

display:inline-block;

transition:.35s ease;

letter-spacing:-1px;

}

/* hover text */

.nav-blog a:hover{
color:#fff;
text-shadow:0 0 10px rgba(247,200,115,0.2);
}

/* underline effect */

.nav-blog span{

display:block;

padding:10px 0;

border-top:1px solid transparent;
border-bottom:1px solid transparent;

position:relative;

z-index:2;

transition:.3s;

}

.nav-blog a:hover span{
border-color:var(--accent);
}

/* ================= HOVER IMAGE ================= */

.nav-blog img{

position:absolute;

pointer-events:none;

opacity:0;

transform:translate(-50%,-50%) scale(.75);

transition:
opacity .25s ease,
transform .3s ease;

width:min(38vw,420px);

border-radius:10px;

box-shadow:0 25px 60px rgba(0,0,0,.7);

z-index:1;

}

/* show image */

.nav-blog a:hover img{

opacity:1;

transform:translate(-50%,-50%) scale(1);

}

/* performance */

.nav-blog img{
will-change:transform,left,top;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

.section-head h2{
font-size:28px;
}

.nav-blog a{
font-size:2rem;
}

.nav-blog img{
display:none;
}

}

</style>

</head>

<body>

<section class="section section-blogs" id="blogs">

<div class="container">

<div class="section-head">

<span>What I Write</span>
<h2>Engineering Blogs</h2>

</div>

<div class="nav-blog" id="blogNav">

<a href="#">
<span>System Design</span>
<img src="https://images.unsplash.com/photo-1660167941111-f7ccce818728?auto=format&fit=crop&w=800&q=60">
</a>

<a href="#">
<span>Backend Architecture</span>
<img src="https://images.unsplash.com/photo-1660070918769-f34c724cfe43?auto=format&fit=crop&w=800&q=60">
</a>

<a href="#">
<span>Laravel Scaling</span>
<img src="https://images.unsplash.com/photo-1660169376132-409f66fedcee?auto=format&fit=crop&w=800&q=60">
</a>

<a href="#">
<span>API Design</span>
<img src="https://images.unsplash.com/photo-1660201367471-9fc0cb34734f?auto=format&fit=crop&w=800&q=60">
</a>

<a href="#">
<span>Database Optimization</span>
<img src="https://images.unsplash.com/photo-1660158847730-e93a2a96ca59?auto=format&fit=crop&w=800&q=60">
</a>

<a href="#">
<span>Node.js Performance</span>
<img src="https://images.unsplash.com/photo-1660074519968-d718487e9a7b?auto=format&fit=crop&w=800&q=60">
</a>

</div>

</div>

</section>

<script>

/* ================= SMOOTH IMAGE FOLLOW ================= */

const blogNav = document.getElementById("blogNav");

blogNav.querySelectorAll("a").forEach(link => {

const img = link.querySelector("img");

let mouseX = 0;
let mouseY = 0;

let currentX = 0;
let currentY = 0;

link.addEventListener("mousemove", e => {

const rect = link.getBoundingClientRect();

mouseX = e.clientX - rect.left;
mouseY = e.clientY - rect.top;

});

function animate(){

currentX += (mouseX - currentX) * 0.15;
currentY += (mouseY - currentY) * 0.15;

img.style.left = currentX + "px";
img.style.top = currentY + "px";

requestAnimationFrame(animate);

}

animate();

});

</script>

</body>
</html>
